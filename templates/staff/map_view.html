{% extends "staff/base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Incident Map</h2>
    <div>
        <span class="badge bg-danger me-2">🔥 Fire</span>
        <span class="badge bg-success me-2">🚑 Rescue</span>
        <span class="badge bg-warning me-2">🚗 Accident</span>
        <span class="badge bg-info me-2">🚒 Vehicle</span>
    </div>
</div>

<div id="map" style="height: 600px; width: 100%; border-radius: 8px; border: 1px solid #ddd;"></div>

<!-- Leaflet CSS and JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Map Icons -->
<style>
    .custom-div-icon {
        background: transparent;
        border: none;
    }
    .marker-pin {
        width: 30px;
        height: 30px;
        border-radius: 50% 50% 50% 0;
        background: #c30b82;
        position: absolute;
        transform: rotate(-45deg);
        left: 50%;
        top: 50%;
        margin: -15px 0 0 -15px;
    }
    .marker-pin::after {
        content: '';
        width: 24px;
        height: 24px;
        margin: 3px 0 0 3px;
        background: #fff;
        position: absolute;
        border-radius: 50%;
    }
    .custom-div-icon i {
        width: 100%;
        text-align: center;
        position: absolute;
        left: 0;
        right: 0;
        margin: 0 auto;
        top: 5px;
        z-index: 2;
    }
</style>

<script>
    // Burgas center coordinates
    var map = L.map('map').setView([42.5063, 27.4678], 12);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Custom icons for different incident types
    function getIcon(type) {
        let color = '#6c757d'; // default gray
        
        if (type === 'fire') color = '#dc3545'; // red
        else if (type === 'rescue') color = '#28a745'; // green
        else if (type === 'accident') color = '#ffc107'; // yellow
        
        return L.divIcon({
            className: 'custom-div-icon',
            html: `<div style="background-color: ${color};" class="marker-pin"></div><i class="fa-solid fa-fire"></i>`,
            iconSize: [30, 42],
            iconAnchor: [15, 42]
        });
    }

    // Vehicle icon
    var vehicleIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="background-color: #17a2b8;" class="marker-pin"></div><i class="fa-solid fa-truck"></i>`,
        iconSize: [30, 42],
        iconAnchor: [15, 42]
    });

    // Add incident markers
    {% for incident in incidents %}
    {% if incident.latitude and incident.longitude %}
        L.marker([{{ incident.latitude }}, {{ incident.longitude }}], {
            icon: getIcon('{{ incident.incident_type }}')
        })
        .addTo(map)
        .bindPopup(`
            <b>#{{ incident.id }} - {{ incident.title }}</b><br>
            <span class="badge bg-{% if incident.incident_type == 'fire' %}danger{% elif incident.incident_type == 'rescue' %}success{% elif incident.incident_type == 'accident' %}warning{% else %}secondary{% endif %}">
                {{ incident.incident_type }}
            </span><br>
            <span class="badge bg-primary">{{ incident.status }}</span><br>
            <small>{{ incident.location }}</small><br>
            <a href="{{ url_for('incident_detail', incident_id=incident.id) }}" class="btn btn-sm btn-outline-primary mt-2">View Details</a>
        `);
    {% endif %}
{% endfor %}

    // Add vehicle markers
    {% for vehicle in vehicles %}
        {% if vehicle.latitude and vehicle.longitude %}
            L.marker([{{ vehicle.latitude }}, {{ vehicle.longitude }}], {
                icon: vehicleIcon
            })
            .addTo(map)
            .bindPopup(`
                <b>{{ vehicle.type }}</b><br>
                <small>{{ vehicle.location }}</small><br>
                <strong>Crew:</strong><br>
                {% for f in vehicle.firefighters %}
                    - {{ f.name }} ({{ f.rank }})<br>
                {% endfor %}
            `);
        {% endif %}
    {% endfor %}
</script>

<!-- Add Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
{% endblock %}
